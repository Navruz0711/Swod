<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Спасибо за заявку</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
        font-family: Arial, Helvetica, sans-serif;
        background: #2f3f46;
      }

      .card {
        width: min(92vw, 520px);
        padding: 28px 20px;
        border-radius: 10px;
        text-align: center;
        background: #f4f6f7;
        color: #1d2327;
      }

      h1 {
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 16px;
      }

      a {
        display: inline-block;
        padding: 10px 18px;
        border-radius: 6px;
        background: #2f3f46;
        color: #fff;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Спасибо!</h1>
      <p>Ваша заявка отправлена. Мы свяжемся с вами в ближайшее время.</p>
      <a href="./index.html">Вернуться на сайт</a>
    </main>
  </body>
</html>
